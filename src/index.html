<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanvaz</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>

<div id="app">

  <!-- Titlebar -->
  <div id="titlebar">
    <div id="titlebar-logo">
      <!-- K icon — 3 stacked cards -->
      <svg class="logo-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="12" height="9" rx="2" fill="#2A2A35"/>
        <rect x="3" y="4" width="12" height="9" rx="2" fill="#1A1A22" stroke="#2E2E3A" stroke-width="0.5"/>
        <rect x="4" y="2" width="12" height="9" rx="2" fill="#DCDCE8" stroke="#4A9EFF" stroke-width="0.5"/>
        <circle cx="14" cy="3" r="2" fill="#4A9EFF"/>
      </svg>
      <span class="logo-text">Kanvaz</span>
    </div>

    <div id="titlebar-title">Untitled Board</div>

    <div id="titlebar-controls">
      <button class="titlebar-btn" id="btn-export" title="Export board (Ctrl+Shift+S)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v8M4 4l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 9v2.5A1.5 1.5 0 003.5 13h7A1.5 1.5 0 0012 11.5V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="titlebar-btn" id="btn-always-on-top" title="Always on top (T)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 2v8M4 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="2" y1="12" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="titlebar-btn" id="btn-minimize" title="Minimize">
        <svg width="12" height="2" viewBox="0 0 12 2"><line x1="0" y1="1" x2="12" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="titlebar-btn" id="btn-maximize" title="Maximize">
        <svg id="icon-maximize" width="11" height="11" viewBox="0 0 11 11"><rect x="0.75" y="0.75" width="9.5" height="9.5" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        <svg id="icon-restore" width="11" height="11" viewBox="0 0 11 11" style="display:none;">
          <rect x="2.75" y="0.75" width="7.5" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M2.75 2.75H1.5A0.75 0.75 0 00.75 3.5v6c0 0.41 0.34 0.75 0.75 0.75h6c0.41 0 0.75-0.34 0.75-0.75V8.25" stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
      </button>
      <button class="titlebar-btn close" id="btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="toolbar-btn" id="btn-new" title="New Board">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="0.75" y="0.75" width="11.5" height="11.5" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="6.5" y1="3.5" x2="6.5" y2="9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="3.5" y1="6.5" x2="9.5" y2="6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      New
    </button>
    <button class="toolbar-btn" id="btn-open" title="Open Board (Ctrl+O)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 4.5A1.5 1.5 0 012.5 3h2.086a1 1 0 01.707.293l.914.914H10.5A1.5 1.5 0 0112 5.707V9.5A1.5 1.5 0 0110.5 11h-8A1.5 1.5 0 011 9.5V4.5z" stroke="currentColor" stroke-width="1.3"/></svg>
      Open
    </button>
    <button class="toolbar-btn" id="btn-save" title="Save Board (Ctrl+S)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 1.5h7.5L11 3v8.5A.5.5 0 0110.5 12h-8a.5.5 0 01-.5-.5V2a.5.5 0 01.5-.5z" stroke="currentColor" stroke-width="1.3"/><rect x="4" y="7" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.3"/><rect x="3.5" y="1.5" width="5" height="3.5" rx="0.5" stroke="currentColor" stroke-width="1.3"/></svg>
      Save
    </button>

    <div class="toolbar-sep"></div>

    <button class="toolbar-btn" id="btn-zoom-in" title="Zoom in (scroll up)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/><line x1="8.5" y1="8.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="3.5" y1="5.5" x2="7.5" y2="5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="5.5" y1="3.5" x2="5.5" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button>
    <button class="toolbar-btn" id="zoom-display" title="Reset zoom (0)" style="min-width:52px; font-family: var(--font-mono); font-size:11px;">100%</button>
    <button class="toolbar-btn" id="btn-zoom-out" title="Zoom out (scroll down)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/><line x1="8.5" y1="8.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="3.5" y1="5.5" x2="7.5" y2="5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button>

    <div class="toolbar-sep"></div>

    <button class="toolbar-btn" id="btn-undo" title="Undo (Ctrl+Z)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M3.5 4.5H9a3.5 3.5 0 010 7H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 2L3 4.5L5.5 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="toolbar-btn" id="btn-redo" title="Redo (Ctrl+Y)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M11.5 4.5H6a3.5 3.5 0 000 7H9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 2L12 4.5L9.5 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="toolbar-spacer"></div>

    <button class="toolbar-btn" id="btn-settings" title="Settings">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 1v1.5M6.5 10.5V12M1 6.5h1.5M10.5 6.5H12M2.4 2.4l1.1 1.1M9.5 9.5l1.1 1.1M2.4 10.6l1.1-1.1M9.5 3.5l1.1-1.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Settings
    </button>
    <button class="toolbar-btn" id="btn-about" title="About Kanvaz">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.3"/><line x1="6.5" y1="6" x2="6.5" y2="9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="6.5" cy="3.5" r="0.75" fill="currentColor"/></svg>
    </button>
    <button class="toolbar-btn" id="btn-shortcuts" title="Shortcuts (?)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.3"/><text x="6.5" y="10" text-anchor="middle" fill="currentColor" font-size="8" font-family="system-ui">?</text></svg>
    </button>
  </div>

  <!-- Board tabs — populated by boards.js -->
  <div id="board-tabs"></div>

  <!-- Canvas area -->
  <div id="canvas-container">
    <canvas id="canvas-grid"></canvas>
    <div id="canvas-world"></div>

    <!-- Empty state -->
    <div id="canvas-empty">
      <svg class="empty-icon" viewBox="0 0 48 48" fill="none">
        <rect x="6" y="14" width="28" height="22" rx="3" stroke="currentColor" stroke-width="2"/>
        <rect x="12" y="10" width="28" height="22" rx="3" stroke="currentColor" stroke-width="2"/>
        <rect x="18" y="6" width="24" height="18" rx="3" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="2"/>
        <circle cx="38" cy="8" r="4" fill="currentColor" opacity="0.3"/>
      </svg>
      <span class="empty-title">Drop images, GIFs or videos here</span>
      <span class="empty-sub" id="empty-sub-hint">Right-click for options · Ctrl+V to paste an image</span>
    </div>

    <!-- Drop overlay -->
    <div id="drop-overlay">
      <span class="drop-label">Drop to add to canvas</span>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <div class="status-item">
      <span class="status-label">Cards</span>
      <span class="status-value" id="status-cards">0</span>
    </div>
    <div class="status-sep"></div>
    <div class="status-item">
      <span class="status-label">Zoom</span>
      <span class="status-value" id="status-zoom">100%</span>
    </div>
    <div class="status-sep"></div>
    <div class="status-item">
      <span class="status-label">Pos</span>
      <span class="status-value" id="status-pos">0, 0</span>
    </div>
    <div class="status-spacer"></div>
    <div class="status-item" id="status-save">Ready</div>
  </div>

</div>

<!-- Context menu -->
<div id="context-menu"></div>

<!-- Dialog overlay -->
<div id="dialog-overlay">
  <div class="dialog" id="dialog-box">
    <h2 id="dialog-title"></h2>
    <p id="dialog-message"></p>
    <div class="dialog-btns" id="dialog-btns"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Scripts — order matters -->
<script src="errors.js"></script>
<script src="media.js"></script>
<script src="canvas.js"></script>
<script src="cards.js"></script>
<script src="history.js"></script>
<script src="annotate.js"></script>
<script src="boards.js"></script>
<script src="shortcuts.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
